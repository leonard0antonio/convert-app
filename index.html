<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert - Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <main class="container">
        <header class="logo">
            <i class="ph ph-arrows-left-right"></i>
            <span>CONVERT</span>
        </header>

        <section class="card">
            <form id="convert-form" class="form-section">
                
                <div class="input-group">
                    <label for="amount">VALOR</label>
                    <input type="number" id="amount" placeholder="0,00" step="0.01" min="0.01" required>
                </div>

                <div class="input-group">
                    <label for="currency">MOEDA</label>
                    <select id="currency" required>
                        <option value="USD">Dólar americano</option>
                        <option value="EUR">Euro</option>
                        <option value="GBP">Libra esterlina</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Converter em reais</button>
            </form>

            <div id="result-section" class="result-section hidden">
                <span id="exchange-rate">US$ 1 = R$ 4,86</span>
                <h2 id="final-result">486,00 Reais</h2>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
